<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Приложение</title>
    <style>
        .link {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
            margin: 5px;
        }
    </style>
</head>
<body>

<h1>Простое AJAX-приложение</h1>
<div id="links">
    <span class="link" data-file="01.html">Псевдоссылка 1</span>
    <span class="link" data-file="02.html">Псевдоссылка 2</span>
    <span class="link" data-file="03.html">Псевдоссылка 3</span>
</div>
<div id="content"></div>

<script>
    document.querySelectorAll('.link').forEach(link => {
        link.addEventListener('click', function () {
            const file = this.dataset.file;
            loadContent(file);
            updateURL(file);
        });
    });

    function loadContent(file) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', file, true);
        xhr.onload = function () {
            if (xhr.status >= 200 && xhr.status < 300) {
                document.getElementById('content').innerHTML = xhr.responseText;
            } else {
                console.error('Ошибка загрузки файла:', xhr.statusText);
            }
        };
        xhr.send();
    }

    function updateURL(file) {
        const url = new URL(window.location);
        url.searchParams.set('file', file); // добавляем параметр 'file' в URL
        window.history.pushState({ file: file }, '', url); // обновляем URL без перезагрузки страницы
    }

    function restoreState() {
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');
        if (file) {
            loadContent(file);
        } else {
            document.getElementById('content').innerHTML = '<p>Выберите содержимое для отображения.</p>';
        }
    }

    // Восстанавливаем состояние при загрузке страницы
    window.onload = restoreState;
</script>

</body>
</html>
